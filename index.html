<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>HMRS | Login</title>
</head>
<body>
    <section class="imageSection">

    </section>
    <section class="loginFormSection">
        <div class="loginForm">
            <div class="username">
                <label for="inputUsername" class="form-label">Username</label>
                <input type="text" id="inputUsername" class="form-control">
            </div>
            <div class="password_wrapper">
                <label for="inputPassword5" class="form-label">Password</label>
                <input type="password" id="inputPassword" class="form-control" aria-describedby="passwordHelpBlock">
                <input class="form-check-input me-1" type="checkbox" value="" id="showPassword">
                <label class="form-check-label" for="showPassword">Show Password</label>
            </div>
            <div class="formButtons d-grid">
                <button class="btn btn-outline-primary" type="button">Login</button>
            </div>
        </div>
    </section>
</body>
</html>
