<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>HMRS | Login</title>
</head>
<body>
    <section class="imageSection">
        <div class="bannerImageWrapper">
            <img id="bannerImage" src="img/The.png" alt="logo of the website as banner image for the login page">
        </div>
    </section>
    <section class="loginFormSection">
        <div class="loginForm">
            <div class="username">
                <label for="inputUsername" class="form-label">Username</label>
                <input type="text" id="inputUsername" class="form-control">
            </div>
            <div class="password_wrapper">
                <label for="inputPassword5" class="form-label">Password</label>
                <input type="password" id="inputPassword" class="form-control" aria-describedby="passwordHelpBlock">
                <input class="form-check-input me-1" type="checkbox" value="" id="showPassword">
                <label class="form-check-label" for="showPassword">Show Password</label>
            </div>
            <div class="formButtons d-grid">
                <button class="btn btn-outline-primary" type="button">Login</button>
            </div>
            <div class="newEmployeeLink">
                <a class="icon-link icon-link-hover" href="new_employee/index.html">
                    Add New Employee
                    <svg xmlns="http://www.w3.org/2000/svg" class="bi" viewBox="0 0 16 16" aria-hidden="true">
                        <path d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l-4 4a.5.5 0 0 1-.708-.708L13.293 8.5H1.5A.5.5 0 0 1 1 8z"/>
                    </svg>
                </a>
            </div>
        </div>
    </section>
</body>
</html>
