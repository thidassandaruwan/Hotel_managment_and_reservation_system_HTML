<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>HTRS | Login</title>
</head>
<body>
    <section class="side_image_section">
        <img id="banner_image" src="img/banner.jpg">
    </section>
    <section class="login_section">
        <div class="username_wrapper">
            <label>Username</label> <br>
            <input type="text" id="username_field">
        </div>
        <div class="password_wrapper">
            <label>Password</label> <br>
            <input type="password" id="password_field">
            <br><input type="checkbox" id="show_password_box">
            <label id="show_pass_label">Show Password</label>
        </div>
        <div class="pass_button_wrapper">
            <button id="login_button">Login</button>
        </div>
        <div class="new_emp_wrapper">
            <a id="new_emp_link" href="index.html"><p>Add New Employee</p></a>
        </div>
    </section>
</body>
</html>
