<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
    <title>HMRS | Add New Employee</title>
</head>
<body id="newFormHtmlBody">
    <section class="newEmployeeForm">
        <div class="nameWrapper">
            <label for="inputName" class="form-label">Name</label>
            <input type="text" id="inputName" class="form-control">
        </div>
        <div class="usernameWrapper">
            <label for="inputUsername" class="form-label">Username</label>
            <input type="text" id="inputUsername" class="form-control">
        </div>
        <div class="password_wrapper">
            <label for="inputPassword5" class="form-label">Password</label>
            <input type="password" id="inputPassword5" class="form-control" aria-describedby="passwordHelpBlock">
            <div id="passwordHelpBlock" class="form-text">
                Your password must be 8-20 characters long, contain letters and numbers, and must not contain spaces, special characters, or emoji.
            </div>
        </div>
        <div class="employeeRoleWrapper">
            <select class="form-select" aria-label="Default select example">
                <option selected>Select employee role</option>
                <option value="1">Manager</option>
                <option value="2">Reciptionist</option>
            </select>
        </div>
        <div class="buttonWrapper">
            <button type="button" class="btn btn-outline-primary">Add Employee</button>
            <button type="button" class="btn btn-outline-danger">Clear Form</button>
        </div>
    </section>
</body>
</html>
